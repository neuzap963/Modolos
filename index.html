<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exer.Lògica e Modulos</title>
  </head>
  <body>
   
    <h2>Conversor de Temperaturas</h2>

    <input
      type="text"
      id="temperatura"
      placeholder="Introduce los grados en Celsius"
    />
    <button id="convertir">Convertir</button>

    <p id="resultado"></p>

    <p></p>

    <h2>Generador de Saludos</h2>

    <input type="text" id="nombre" placeholder="Introduce tu nombre" />

    <select id="idioma">
      <option value="pt">Português</option>
      <option value="de">Aleman</option>
      <option value="fr">Francés</option>
    </select>

    <button id="saludar">Saludar</button>
    <p id="resultadoSaludo"></p>

    <p></p>

    <h2>Calculadora de Áreas</h2>

    <h3>Cuadrado</h3>
    <input type="text" id="lado" placeholder="Introduce el lado" />
    <button id="btnCuadrado">Calcular área</button>
    <p id="resultadoCuadrado"></p>

    <h3>Círculo</h3>
    <input type="text" id="radio" placeholder="Introduce el radio" />
    <button id="btnCirculo">Calcular área</button>
    <p id="resultadoCirculo"></p>

    <p></p>

    <h2>Validador de Password</h2>

    <input
      type="password"
      id="password"
      placeholder="Introduce tu contraseña"
    />
    <p id="resultadoPassword">Seguridad: Débil</p>

    <p></p>

    <h2>El Contador con Límite</h2>

    <button id="btnDecrementar">-</button>
    <span id="valorContador">0</span>
    <button id="btnIncrementar">+</button>

    <script type="module" src="./main.js"></script>

    
  </body>
</html>
